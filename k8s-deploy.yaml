apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubecheck-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubecheck-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubecheck-rb
subjects:
- kind: ServiceAccount
  name: kubecheck-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: kubecheck-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Pod
metadata:
  name: kubecheck-monitor
spec:
  serviceAccountName: kubecheck-sa
  containers:
  - name: kubecheck
    image: docker.io/library/kubecheck:v2
    imagePullPolicy: Never